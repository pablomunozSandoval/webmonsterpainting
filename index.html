<!DOCTYPE html>
<html lang="es">
<head>

  <!-- ─── HEADER ─────────────────────────────────────────────────── -->

          Reddit
        </a>
        <a id="social-email" class="social-link" href="mailto:pablo.sandoval.munoz.1994@gmail.com" target="_blank" rel="noopener">
         <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
          Email
        </a>
      </div>
    </div>
    <div class="header-divider">
      <svg viewBox="0 0 1200 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,20 L100,5 L200,20 L300,5 L400,20 L500,5 L600,20 L700,5 L800,20 L900,5 L1000,20 L1100,5 L1200,20 L1200,40 L0,40 Z" fill="#0d0a07"/>
      </svg>
    </div>
  </header>

  <!-- ─── MAIN ──────────────────────────────────────────────────── -->
  <main class="site-main">

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-number" id="stat-total">0</span>
        <span class="stat-label">Miniaturas</span>
      </div>
      <div class="stat-divider">✦</div>
      <div class="stat-item">
        <span class="stat-number" id="stat-featured">0</span>
        <span class="stat-label">Destacadas</span>
      </div>
    </div>

    <!-- Filters -->
    <section class="filters-section" aria-label="Filtros de galería">
      <div class="filters-container">
        <div class="search-wrapper">
          <span class="search-icon">⚔</span>
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Buscar por nombre, técnica, facción..."
            aria-label="Buscar miniaturas"
          />
        </div>
        <div class="filter-controls">
          <select id="filter-faction" class="filter-select" aria-label="Filtrar por facción">
            <option value="">Todas las facciones</option>
          </select>
          <select id="filter-style" class="filter-select" aria-label="Filtrar por técnica">
            <option value="">Todas las técnicas</option>
          </select>
          <select id="filter-difficulty" class="filter-select" aria-label="Filtrar por dificultad">
            <option value="">Toda dificultad</option>
            <option value="Principiante">Principiante</option>
            <option value="Intermedio">Intermedio</option>
            <option value="Avanzado">Avanzado</option>
            <option value="Experto">Experto</option>
          </select>
          <label class="featured-toggle" aria-label="Solo destacadas">
            <input type="checkbox" id="filter-featured" />
            <span class="toggle-text">★ Solo destacadas</span>
          </label>
          <button id="reset-filters" class="btn-reset">Limpiar</button>
        </div>
        <p class="result-count" id="result-count"></p>
      </div>
    </section>

    <!-- Gallery -->
    <section class="gallery-section" aria-label="Galería de miniaturas">
      <div class="gallery-grid" id="gallery-grid">
        <!-- Populated by JS -->
      </div>
    </section>

  </main>

  <!-- ─── FOOTER ────────────────────────────────────────────────── -->
  <footer class="site-footer">
    <div class="footer-divider">
      <svg viewBox="0 0 1200 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,20 L100,35 L200,20 L300,35 L400,20 L500,35 L600,20 L700,35 L800,20 L900,35 L1000,20 L1100,35 L1200,20 L1200,0 L0,0 Z" fill="#0d0a07"/>
      </svg>
    </div>
    <p class="footer-text">
      Pintado con paciencia y pasión ⚔ <span data-author-name></span>
    </p>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
